<!DOCTYPE html>
<html>

<head>
  <title>Subhadeep Pramanik Portfolio</title>
  <link rel="stylesheet" type="text/css" href="./adrianalvird/static/style.css">
  	<link rel="icon" type="image/png" sizes="32x32" href="./adrianalvird/images/fevicon/favicon.png">
</head>
<body>
  <div id="terminal" draggable="true">
    <div id="terminal-header">
      <div id="window-controls">
        <div class="window-control" id="extend-button"></div>
        <div class="window-control" id="minimize-button"></div>
        <div class="window-control" id="close-button"></div>
      </div>
      <div id="terminal-title">root@Subhadeep:~</div>
      
    </div>
    <div id="terminal-body">
      <pre id="output"></pre>
      <div id="input-line">
        <span id="prompt">$_</span>
        <input type="text" id="input" autofocus>
      </div>
    </div>
  </div>
  <div id="popup" class="popup">
  <span id="popup-message">Type: 'portfolio'on this terminal to open main portfilio page; or use 'command' to see available commands, or 'help' for help.  </span>
  <button id="close-popup">Close</button>
</div>


  <script src="./adrianalvird/static/script.js"></script>
</body>

</html>
